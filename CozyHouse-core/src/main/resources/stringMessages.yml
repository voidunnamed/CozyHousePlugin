commands:

  # -- CozyHouseCore help -----------------------------------------------------------
  help:
    header: "&6&m══════════════════════════════════"
    title: "&e&lCOZYHOUSE - COMMAND HELP"
    empty-line: ""
    footer: "&6&m══════════════════════════════════"
    lines:
      - "&e/ch help &8- &fOpen command help"
      - "&e/ch addmoney [amount] &8- &fAdd money to your bank account"
      - "&e/ch withdrawmoney [amount] &8- &fWithdraw money from your bank account"
      - "&e/ch setmoney [amount] &8- &fSet the amount of money in your bank account"

  no-permission: "&c&l&o||| You do not have permission to run this command |||"
  player-only: "&c&l&o||| This command can only be executed by a player |||"
  console-only: "&c&l&o||| This command can only be executed from the console |||"
  unknown-command: "&c&l&o||| Unknown command. Type &e/ch help &c&l&ofor help |||"
  invalid-arguments: "&c&l&o||| Invalid arguments. Use: &e%usage% |||"
  display-money: "&2&lYou have &9&l%number% &2&lCozyCoins!"

  # -- RPG commands (/chrpg) ----------------------------------------------------
  rpg:
    player-not-found: "&cPlayer not found or offline: &e%player%"
    invalid-amount: "&cInvalid amount. Please enter a positive integer."
    unknown-action: "&cUnknown action. Use &egive &cor &eset&c."

    help:
      header: "&8&m──────────────────────────────────────"
      title: "&6&l  ✦ CozyHouseRPG — Help &6&l✦"
      empty-line: ""
      footer: "&8&m──────────────────────────────────────"
      lines:
        - "&e/chrpg info &8- &fDisplay your race and general info"
        - "&e/chrpg stats [player] &8- &fDisplay complete statistics"
        - "&e/chrpg changerace &8- &f[Admin] Change your race"
        - "&e/chrpg exp <give|set> <player> <amount> &8- &f[Admin] Manage XP"
        - "&e/chrpg level <give|set> <player> <amount> &8- &f[Admin] Manage level"
        - "&e/chrpg tesseres &8- &fOpen the arcane engraving menu"
        - "&e/chrpg tesseres info &8- &fDisplay your current engraving status"
        - "&e/chrpg tesseres reset &8- &f[Admin] Reset engraving"

    exp:
      usage: "&cUsage: &e/chrpg exp <give|set> <player> <amount>"
      already-max: "&e%player% &cis already at maximum level."
      give-success-admin: "&a✔ &e+%amount% XP &agiven to &e%player% &a| XP: &b%xp%"
      give-success-player: "&a+&e%amount% XP &areceived!"
      set-success-admin: "&a✔ XP of &e%player% &aset | Level: &a%level% &7| XP: &b%xp%"
      set-success-player: "&aYour XP has been modified by an admin. Level: &a%level%"

    level:
      usage: "&cUsage: &e/chrpg level <give|set> <player> <amount>"
      capped: "&eLevel capped at maximum (&6%max%&e)."
      give-success-admin: "&a✔ &e+%amount% level(s) &agiven to &e%player% &a| Level: &a%level%"
      give-success-player: "&aYou gained &e%amount% level(s)&a! Current level: &a%level%"
      set-success-admin: "&a✔ Level of &e%player% &aset to &a%level%"
      set-success-player: "&aYour level has been set to &a%level% &aby an admin."

    stats:
      header: "&8&m──────────────────────────────────────"
      title: "&6&l  ✦ Stats of %player% &6&l✦"
      footer: "&8&m──────────────────────────────────────"
      empty-line: ""
      race-level-xp: "  &7Race: &f%race%   &7Level: &a%level%   &7XP: &b%xp%"
      skill-points: "  &7Skill Points: &d%points%"
      health: "  &cHealth &f%health% &7/ &f%maxhealth%"
      attributes-header: "&6  ⚔ Attributes"
      strength: "  &7  Strength     : &f%value%"
      dexterity: "  &7  Dexterity    : &f%value%"
      constitution: "  &7  Constitution : &f%value%"
      intelligence: "  &7  Intelligence : &f%value%"
      charisma: "  &7  Charisma     : &f%value%"
      combat-header: "&e  ⚡ Combat"
      attack-damage: "  &7  Att. Damage  : &f%value%"
      attack-speed: "  &7  Att. Speed   : &f%value%"
      armor: "  &7  Armor        : &f%value%"
      toughness: "  &7  Toughness    : &f%value%"
      crit-chance: "  &7  Crit. Chance : &f%value%"
      crit-damage: "  &7  Crit. Damage : &f%value%"
      dodge: "  &7  Dodge        : &f%value%"
      kb-resistance: "  &7  KB Resist.   : &f%value%"
      bonuses-header: "&b  🌊 Bonuses & Resistances"
      exp-bonus: "  &7  XP Bonus     : &f%value%"
      loot-bonus: "  &7  Loot Bonus   : &f%value%"
      trade-discount: "  &7  Trade Disc.  : &f%value%"
      poison-resist: "  &7  Poison Res.  : &f%value%"
      fall-reduce: "  &7  Fall Reduc.  : &f%value%"
      swim-speed: "  &7  Swim Speed   : &f%value%"

